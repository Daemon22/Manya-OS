name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-typecheck-test:
    name: Build, typecheck, and test all 12 packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Run Jest suite
        run: npm test

      - name: Build (esbuild dual CJS/ESM + types + super-bundle)
        run: npm run build:prod
